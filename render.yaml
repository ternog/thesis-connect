services:
  - type: web
    name: thesis-connect-backend
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: cd backend && cp .env.example .env && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev && php artisan key:generate --force && php artisan storage:link
    startCommand: cd backend && php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://thesis-connect-backend.onrender.com
      CORS_ALLOWED_ORIGINS: https://thesis-connect-mbc.web.app
