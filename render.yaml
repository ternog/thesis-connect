services:
  - type: web
    name: thesis-connect-backend
    env: node
    plan: free
    branch: main
    autoDeploy: true
    rootDir: backend
    buildCommand: composer install --optimize-autoloader --no-dev && php artisan key:generate --force
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://thesis-connect-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://thesis-connect-mbc.web.app