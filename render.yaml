services:
  - type: web
    name: thesis-connect-backend
    env: php
    root: backend
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: cp .env.example .env && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev && php artisan key:generate --force && php artisan storage:link
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://thesis-connect-backend.onrender.com
      CORS_ALLOWED_ORIGINS: https://thesis-connect-mbc.web.app
      DB_CONNECTION: mysql
      DB_HOST: ${DATABASE_HOST}
      DB_PORT: ${DATABASE_PORT}
      DB_DATABASE: ${DATABASE_NAME}
      DB_USERNAME: ${DATABASE_USER}
      DB_PASSWORD: ${DATABASE_PASSWORD}

databases:
  - name: thesis-connect-db
    engine: mysql
    plan: starter
    region: oregon
    branch: main
