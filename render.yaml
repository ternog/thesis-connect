services:
  - type: web
    name: thesis-connect-backend
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://thesis-connect-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://thesis-connect-mbc.web.app