services:
  - type: web
    name: thesis-connect-backend
    env: php
    root: backend
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: cp .env.example .env && COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-dev && php artisan key:generate --force && php artisan storage:link
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    env:
      - name: APP_ENV
        value: production
      - name: APP_DEBUG
        value: false
      - name: APP_URL
        value: https://thesis-connect-backend.onrender.com
      - name: CORS_ALLOWED_ORIGINS
        value: https://thesis-connect-mbc.web.app
      - name: DATABASE_URL
        value: ${DATABASE_URL}

  - type: mysql
    name: thesis-connect-db
    plan: starter
    region: oregon
    branch: main
